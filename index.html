<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學出題小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        
        /* 柔和的漸層背景 */
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%); min-height: 100vh; }
        .exam-font { font-family: 'Noto Serif TC', serif; }
        
        /* 隱藏數字輸入框上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 表頭的黑色方塊單選框 */
        .box-radio { appearance: none; width: 14px; height: 14px; border: 1.5px solid #000; display: inline-block; position: relative; cursor: pointer; top: 2px;}
        .box-radio:checked { background-color: #000; }
        
        /* 題型設定的綠色打勾框 */
        .custom-checkbox { appearance: none; width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 6px; display: inline-block; position: relative; cursor: pointer; transition: all 0.2s;}
        .custom-checkbox:checked { background-color: #0d9488; border-color: #0d9488; }
        .custom-checkbox:checked::after { content: ''; position: absolute; left: 7px; top: 3px; width: 5px; height: 11px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
        
        /* 考卷表頭專用邊框 */
        .exam-table { border: 2px solid #000; border-collapse: collapse; width: 100%; background: #fff; }
        .exam-table td { border: 1px solid #000; padding: 12px; }

        /* 卡片玻璃透光質感 */
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); }
    </style>
</head>
<body class="text-gray-800 pb-10 flex flex-col items-center">

<div id="app" class="w-full max-w-5xl px-4 pt-12 pb-6">
    
    <div class="text-center mb-8">
        <h1 class="text-5xl md:text-6xl font-black mb-4 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-cyan-600 drop-shadow-sm">
            <i class="fas fa-cube text-teal-500 mr-3 text-4xl"></i>數學出題小幫手
        </h1>
        <p class="text-gray-500 text-lg font-medium tracking-wide">運用 AI 強大算力・精準匯入素材・LaTeX 完美排版</p>
    </div>

    <div class="glass-card rounded-xl p-4 mb-8 flex items-center justify-between border-l-4 border-amber-400 max-w-2xl mx-auto">
        <div class="flex items-center w-full">
            <i class="fas fa-key text-amber-500 text-xl mr-3"></i>
            <div class="flex-grow">
                <label class="text-xs font-bold text-gray-500">Gemini API Key (僅儲存於您的瀏覽器)</label>
                <input type="password" v-model="apiKey" @change="saveApiKey" placeholder="輸入 _AIza_ 開頭的 API 金鑰..." class="w-full bg-transparent border-b border-gray-300 focus:border-teal-500 outline-none text-gray-700 py-1 text-sm font-mono">
            </div>
            <div v-if="apiKey" class="ml-3 text-green-500 text-sm font-bold flex items-center">
                <i class="fas fa-check-circle mr-1"></i> 已設定
            </div>
        </div>
    </div>

    <div class="space-y-8">
        <div class="glass-card rounded-2xl p-6 md:p-8">
            <h2 class="text-sm font-bold text-gray-400 mb-8 text-center tracking-widest">WORKFLOW 流程</h2>
            <div class="flex justify-between items-center relative px-2 md:px-16">
                <div class="absolute left-12 right-12 top-6 h-[2px] bg-teal-100 -z-10"></div>
                <div class="flex flex-col items-center px-2">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 text-white flex items-center justify-center font-bold text-xl mb-3 shadow-lg shadow-teal-200">1</div>
                    <span class="text-sm font-bold text-gray-700 text-center">設定表頭</span>
                </div>
                <div class="flex flex-col items-center px-2">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 text-white flex items-center justify-center font-bold text-xl mb-3 shadow-lg shadow-teal-200">2</div>
                    <span class="text-sm font-bold text-gray-700 text-center">上傳素材</span>
                </div>
                <div class="flex flex-col items-center px-2">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 text-white flex items-center justify-center font-bold text-xl mb-3 shadow-lg shadow-teal-200">3</div>
                    <span class="text-sm font-bold text-gray-700 text-center">設定題型</span>
                </div>
                <div class="flex flex-col items-center px-2">
                    <div class="w-12 h-12 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-bold text-xl mb-3 border-2 border-white box-content">4</div>
                    <span class="text-sm font-bold text-gray-500 text-center">匯出 WORD</span>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">1</span>
                考卷表頭設定
            </h2>
            <div class="overflow-x-auto rounded-lg shadow-sm">
                <table class="exam-table exam-font text-black min-w-[700px]">
                    <tr>
                        <td colspan="2" class="text-center text-3xl font-bold text-red-600 tracking-widest py-8">
                            <input v-model="exam.school" class="w-36 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <input v-model="exam.year" type="number" class="w-20 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <span class="text-2xl pt-1">學年第</span>
                            <input v-model="exam.semester" type="number" class="w-12 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <span class="text-2xl pt-1">學期</span>
                            <input v-model="exam.name" class="w-56 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 ml-4 transition">
                        </td>
                        <td rowspan="2" class="align-middle p-0 w-48 bg-gray-50/50">
                            <div class="flex flex-col h-full">
                                <div class="border-b border-black p-3 text-center font-bold text-lg tracking-widest">科目：數學</div>
                                <div class="p-4 text-base leading-relaxed flex-grow flex flex-col justify-center space-y-2">
                                    <label class="cursor-pointer block hover:text-teal-700 transition">
                                        <input type="radio" v-model="exam.useCard" :value="true" class="box-radio mr-2"> 使用答案卡
                                    </label>
                                    <label class="cursor-pointer block hover:text-teal-700 transition">
                                        <input type="radio" v-model="exam.useCard" :value="false" class="box-radio mr-2"> 不使用答案卡
                                    </label>
                                    <label class="cursor-pointer block hover:text-teal-700 transition">
                                        <input type="checkbox" v-model="exam.specialNeeds" class="box-radio mr-2"> 特殊生考卷
                                    </label>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-base p-4">
                            <span class="font-bold mr-2">科別：</span>
                            <label class="cursor-pointer mr-4 hover:text-teal-700"><input type="radio" v-model="exam.dept" value="工科" class="box-radio mr-1">工科</label>
                            <label class="cursor-pointer mr-4 hover:text-teal-700"><input type="radio" v-model="exam.dept" value="商科" class="box-radio mr-1">商科</label>
                            <label class="cursor-pointer hover:text-teal-700"><input type="radio" v-model="exam.dept" value="體育科" class="box-radio mr-1">體育科</label>
                        </td>
                        <td class="text-base p-4">
                            <label class="cursor-pointer mr-6 hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高一" class="box-radio mr-1">高一</label>
                            <label class="cursor-pointer mr-6 hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高二" class="box-radio mr-1">高二</label>
                            <label class="cursor-pointer hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高三" class="box-radio mr-1">高三</label>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">2</span>
                匯入素材與出題要求
            </h2>
            
            <div class="border-2 border-dashed border-teal-200 rounded-2xl p-10 flex flex-col items-center justify-center bg-teal-50/30 hover:bg-teal-50 transition cursor-pointer relative mb-6 group min-h-[160px]">
                <input type="file" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.jpg,.png,.jpeg" @change="handleFileUpload">
                
                <div v-if="uploadedFiles.length === 0" class="text-center group-hover:scale-105 transition-transform duration-300">
                    <i class="fas fa-cloud-upload-alt text-5xl text-teal-400 mb-4 drop-shadow-sm"></i>
                    <h3 class="text-teal-800 font-bold text-lg mb-1">點擊或拖曳多個檔案至此處</h3>
                    <p class="text-sm text-teal-600/70">支援 PDF、圖檔 <span class="font-bold text-red-500">(⚠️ Word 檔請先另存為 PDF 再上傳)</span></p>
                </div>
                
                <div v-else class="text-center w-full px-4">
                    <i class="fas fa-copy text-4xl text-teal-500 mb-3 drop-shadow-sm"></i>
                    <h3 class="text-teal-800 font-bold text-lg mb-2">已成功匯入 {{ uploadedFiles.length }} 個檔案</h3>
                    <ul class="text-sm text-teal-700 text-left list-disc pl-5 max-h-32 overflow-y-auto w-3/4 mx-auto bg-white/60 p-3 rounded-lg border border-teal-100 shadow-inner">
                        <li v-for="(file, index) in uploadedFiles" :key="index" class="truncate">{{ file.name }}</li>
                    </ul>
                    <button @click.stop="uploadedFiles = []" class="mt-3 text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full hover:bg-red-200 z-10 relative">重新上傳</button>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-base font-bold text-gray-700 mb-2 flex items-center">
                    <i class="fas fa-bullseye text-red-500 mr-2"></i> 指定出題單元 / 範圍縮小
                </label>
                <input v-model="targetUnit" type="text" placeholder="例如：只需從上傳檔案中抽出「第三單元：矩陣」的內容來出題" class="w-full text-sm md:text-base border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none text-gray-800 shadow-sm bg-white">
            </div>

            <div class="bg-gray-50/50 rounded-xl p-6 border border-gray-100">
                <label class="block text-base font-bold text-gray-700 mb-3 flex items-center">
                    <i class="fas fa-clipboard-check text-teal-500 mr-2"></i> 出題原則與要求 <span class="text-xs font-normal text-gray-400 ml-3">(可自由修改)</span>
                </label>
                <textarea v-model="examRules" rows="10" class="w-full text-sm md:text-base border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-teal-400 outline-none leading-relaxed text-gray-700 bg-white shadow-inner"></textarea>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">3</span>
                題型與配分設定 (支援手動配分)
            </h2>
            
            <div class="space-y-5">
                <div v-for="(type, index) in questionTypes" :key="index" 
                     class="border border-gray-200 rounded-xl p-5 md:p-6 shadow-sm transition duration-300"
                     :class="type.enabled ? 'bg-white hover:border-teal-300' : 'bg-gray-50/60 opacity-70 grayscale-[30%]'">
                    
                    <div class="flex items-center mb-5">
                        <input type="checkbox" v-model="type.enabled" class="custom-checkbox mr-4">
                        <span class="font-bold text-gray-800 text-xl">{{ type.name }}</span>
                    </div>

                    <div v-if="type.enabled" class="flex flex-wrap md:flex-nowrap items-center gap-6 pl-10">
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-500">題數</span>
                            <input type="number" v-model="type.count" class="w-20 border border-gray-300 rounded-lg p-2.5 text-center focus:ring-2 focus:ring-teal-500 outline-none font-bold text-gray-700">
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-500">每題配分</span>
                            <input type="number" v-model="type.score" class="w-20 border border-gray-300 rounded-lg p-2.5 text-center focus:ring-2 focus:ring-teal-500 outline-none font-bold text-gray-700 bg-white">
                        </div>

                        <div class="flex items-center gap-3 flex-grow">
                            <span class="text-sm font-bold text-gray-500">難度</span>
                            <div class="relative flex-grow max-w-xs">
                                <span class="absolute inset-y-0 left-3 flex items-center text-amber-400"><i class="fas fa-bolt text-xs bg-amber-50 p-1.5 rounded-full"></i></span>
                                <select v-model="type.difficulty" class="w-full border border-gray-300 rounded-lg py-2.5 pl-11 pr-3 appearance-none focus:ring-2 focus:ring-teal-500 outline-none bg-white text-gray-700 text-sm font-medium">
                                    <option>中階 (Procedural)</option>
                                    <option>初階 (Basic)</option>
                                    <option>高階 (Advanced)</option>
                                    <option>素養 (Competency)</option>
                                </select>
                                <span class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-400"><i class="fas fa-chevron-down text-xs"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 mb-8 text-center bg-white/50 backdrop-blur-md rounded-3xl p-8 border border-white shadow-xl">
            
            <h2 class="text-lg font-bold text-gray-700 mb-6 tracking-wide">匯出內容勾選</h2>
            
            <div class="flex justify-center flex-wrap gap-5 mb-8">
                <label class="flex items-center cursor-pointer font-bold text-gray-600 hover:text-teal-600 transition bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 hover:border-teal-200">
                    <input type="checkbox" v-model="exportOptions.examPaper" class="custom-checkbox mr-3">
                    <i class="fas fa-file-alt mr-2 text-teal-500 text-lg"></i> 1. 試題考卷 (預設 B4，含作答區)
                </label>
                
                <label class="flex items-center cursor-pointer font-bold text-gray-600 hover:text-blue-600 transition bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 hover:border-blue-200">
                    <input type="checkbox" v-model="exportOptions.correctAnswers" class="custom-checkbox mr-3">
                    <i class="fas fa-check-circle mr-2 text-blue-500 text-lg"></i> 2. 正確答案
                </label>
                
                <label class="flex items-center cursor-pointer font-bold text-gray-600 hover:text-amber-600 transition bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 hover:border-amber-200">
                    <input type="checkbox" v-model="exportOptions.detailedSolutions" class="custom-checkbox mr-3">
                    <i class="fas fa-book-open mr-2 text-amber-500 text-lg"></i> 3. 詳解
                </label>
            </div>

            <button @click="generateAndExport" class="bg-gradient-to-r from-teal-500 to-cyan-600 text-white px-12 py-5 rounded-2xl text-2xl font-black shadow-lg shadow-teal-500/30 hover:shadow-teal-500/50 hover:scale-105 transition-all duration-300 w-full md:w-auto inline-flex items-center justify-center">
                <i class="fas fa-file-word mr-4 text-3xl"></i> 開始解析並下載 WORD
            </button>
            
            <div id="status-message" class="text-sm font-bold mt-5 text-teal-600 h-6"></div>
        </div>
    </div>
    
    <footer class="mt-16 text-center">
        <div class="inline-block border-t border-gray-300/60 pt-6 px-12">
            <span class="text-gray-400/80 font-black tracking-[0.3em] text-lg select-none">byKC</span>
        </div>
    </footer>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            exam: {
                school: '三重商工',
                year: '114',
                semester: '2',
                name: '第一次期中考',
                dept: '工科',
                grade: '高二',
                useCard: false,
                specialNeeds: false
            },
            uploadedFiles: [],
            targetUnit: '',
            examRules: `1. 至少 70%為課本、習作為出題標準
2. 數據可改
3. 選擇題至少佔 40 分
4. 題幹明確：題幹完整，避免過短或過長。
5. 誘答力：錯誤選項（Distractors）要具似真性，避免一眼看出答案。
6. 避免暗示：避免將關鍵字詞重複在正確答案中，或出現「以上皆是/非」的選項。
7. 用詞明確：避免否定式敘述或模糊條件。
8. 無歧視性：題目內容不應對特定性別、種族、城鄉背景有偏見。
9. 排版清晰：題幹與選項在同一頁，符號正確。`,
            questionTypes: [
                { name: '選擇題', enabled: true, count: 10, score: 6, difficulty: '中階 (Procedural)' },
                { name: '填充題', enabled: true, count: 8, score: 5, difficulty: '中階 (Procedural)' },
                { name: '計算題', enabled: false, count: 0, score: 10, difficulty: '中階 (Procedural)' }
            ],
            exportOptions: {
                examPaper: true,
                correctAnswers: true,
                detailedSolutions: true
            }
        }
    },
    methods: {
        saveApiKey() {
            localStorage.setItem('gemini_api_key', this.apiKey);
        },
        handleFileUpload(event) {
            const files = event.target.files;
            if (files.length > 0) {
                this.uploadedFiles = Array.from(files);
            }
        },
        async fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve({
                        inlineData: {
                            data: base64String,
                            mimeType: file.type
                        }
                    });
                };
                reader.onerror = error => reject(error);
            });
        },
        
        // 🌟 新增：強大的 LaTeX 轉圖片處理器
        formatMathToImages(text) {
            if (!text) return '';
            
            // 處理換行
            let result = text.replace(/\n/g, '<br>');
            
            // 替換 $$ ... $$ (獨立行大公式) -> 轉成 CodeCogs 圖片，加上垂直置中
            result = result.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                return `<br><img src="https://latex.codecogs.com/png.image?\\dpi{150}\\bg{white}${encodeURIComponent(p1.trim())}" style="vertical-align: middle; max-width: 100%;" /><br>`;
            });
            
            // 替換 $ ... $ (行內小公式) -> 轉成 CodeCogs 圖片，加上垂直置中
            result = result.replace(/\$([\s\S]+?)\$/g, (match, p1) => {
                return `<img src="https://latex.codecogs.com/png.image?\\dpi{150}\\bg{white}${encodeURIComponent(p1.trim())}" style="vertical-align: middle;" />`;
            });
            
            return result;
        },

        downloadDocFile(htmlContent, filename) {
            // 加入 BOM (\ufeff) 確保中文在 Word 裡面絕對不會亂碼
            const blob = new Blob(['\ufeff', htmlContent], {
                type: 'application/msword'
            });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        },

        async generateAndExport(event) {
            if (!this.apiKey) {
                alert('⚠️ 老師，請先在最上方輸入您的 Gemini API Key！');
                return;
            }
            if (this.uploadedFiles.length === 0 && !this.targetUnit) {
                alert('⚠️ 請至少上傳一份講義素材，或在「指定單元」欄位輸入出題範圍！');
                return;
            }

            const btn = event.currentTarget;
            const statusDiv = document.getElementById('status-message');
            const originalHTML = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-3 text-3xl"></i> AI 正在讀取並生成題目...';
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                statusDiv.innerText = "正在處理檔案，並為您生成實體 Word 檔案中，請稍候...";

                const fileParts = await Promise.all(this.uploadedFiles.map(file => this.fileToBase64(file)));
                
                const activeTypes = this.questionTypes.filter(t => t.enabled).map(t => `${t.name}: ${t.count}題 (${t.difficulty})`).join(', ');
                const promptText = `
您是一位專業的高中數學老師。請根據我提供的素材檔案（講義或舊考卷），幫我出一份全新的數學考卷。
【指定範圍/單元】：${this.targetUnit || '全部上傳內容'}
【題型配置】：${activeTypes}
【出題原則】：
${this.examRules}

【輸出格式要求】：
請直接以 JSON 格式回傳，不要加上 \`\`\`json 標籤，格式如下：
{
  "questions": [
    { "type": "選擇題", "question": "題目敘述(數學公式與符號請務必用 $ 包住，例如 $x^2+y^2=1$)", "options": ["(A)...", "(B)...", "(C)...", "(D)..."], "answer": "正確選項", "solution": "詳解過程" },
    { "type": "填充題", "question": "題目敘述(數學公式與符號請務必用 $ 包住)", "answer": "正確答案", "solution": "詳解過程" },
    { "type": "計算題", "question": "題目敘述", "answer": "正確答案", "solution": "詳解過程" }
  ]
}`;
                
                const contents = [{ parts: [{ text: promptText }, ...fileParts] }];

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${this.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: contents })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const resultText = data.candidates[0].content.parts[0].text;
                
                // 嚴格解析 AI 的 JSON 回應
                let cleanJsonStr = "";
                const jsonMatch = resultText.match(/\{[\s\S]*\}/);
                if(jsonMatch) {
                    cleanJsonStr = jsonMatch[0];
                } else {
                    throw new Error("AI 回傳的格式不正確，找不到考卷資料。");
                }
                
                let quizData = JSON.parse(cleanJsonStr);
                
                // ==============================================================
                // 📝 預設為 B4 紙張，並神還原段考格式
                // ==============================================================
                let docHTML = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>數學考卷</title>
                <style>
                    /* 🌟 核心：設定微軟 Word 讀取的頁面大小為 B4 (257mm x 364mm) */
                    @page WordSection1 {
                        size: 257mm 364mm;
                        margin: 15mm 15mm 15mm 15mm;
                        mso-page-orientation: portrait;
                    }
                    div.WordSection1 { page: WordSection1; }
                    
                    body { font-family: '標楷體', 'Times New Roman', serif; }
                    .header-table { border-collapse: collapse; width: 100%; border: 2px solid black; }
                    .header-table td { border: 1px solid black; padding: 5px; font-size: 14pt; }
                    .ans-table { border-collapse: collapse; width: 100%; border: 2px solid black; text-align: center; margin-top: 10px; }
                    .ans-table td { border: 1px solid black; padding: 15px; font-size: 14pt; height: 40px; }
                </style>
                </head>
                <body>
                <div class="WordSection1">
                `;

                // --- 考卷表頭設計 ---
                docHTML += `
                <table class="header-table">
                    <tr>
                        <td colspan="2" style="text-align: center; font-size: 20pt; color: red; font-weight: bold; letter-spacing: 2px; padding: 15px;">
                            ${this.exam.school}　${this.exam.year} 學年第 ${this.exam.semester} 學期　${this.exam.name}
                        </td>
                        <td rowspan="2" style="width: 25%; line-height: 1.5; font-size: 12pt;">
                            科目：<b>數學</b><br>
                            ${this.exam.useCard ? '■' : '□'}使用答案卡<br>
                            ${!this.exam.useCard ? '■' : '□'}不使用答案卡<br>
                            ${this.exam.specialNeeds ? '■' : '□'}特殊生考卷
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size: 12pt;">科別：${this.exam.dept==='工科'?'■':'□'}工科、${this.exam.dept==='商科'?'■':'□'}商科、${this.exam.dept==='體育科'?'■':'□'}體育科</td>
                        <td style="font-size: 12pt;">${this.exam.grade==='高一'?'■':'□'}高一、${this.exam.grade==='高二'?'■':'□'}高二、${this.exam.grade==='高三'?'■':'□'}高三</td>
                    </tr>
                    <tr>
                        <td colspan="3" style="font-size: 14pt; padding: 10px;">　班級：　　　　　　　學號：　　　　　　　姓名：</td>
                    </tr>
                </table>
                <br>
                `;

                const groupedQs = { '選擇題': [], '填充題': [], '計算題': [] };
                if(quizData.questions) {
                    quizData.questions.forEach(q => { if(groupedQs[q.type]) groupedQs[q.type].push(q); });
                }

                const getScore = (typeName) => {
                    const t = this.questionTypes.find(x => x.name === typeName);
                    return t ? parseInt(t.score) || 0 : 0;
                };

                // --- 1. 輸出試題區 ---
                if (this.exportOptions.examPaper) {
                    let sectionNum = ['一', '二', '三'];
                    let sectionIdx = 0;

                    ['選擇題', '填充題', '計算題'].forEach(tName => {
                        if (groupedQs[tName].length > 0) {
                            let score = getScore(tName);
                            let totalScore = score * groupedQs[tName].length;
                            
                            docHTML += `<p style="font-size: 16pt; font-weight: bold; margin-top: 20px;">${sectionNum[sectionIdx]}、${tName}（每題 ${score} 分，共 ${totalScore} 分）</p>`;
                            sectionIdx++;
                            
                            groupedQs[tName].forEach((q, idx) => {
                                // 🌟 核心：套用 formatMathToImages 將 LaTeX 轉換為清晰圖片
                                docHTML += `<p style="font-size: 14pt; margin-top: 10px; line-height: 1.5;">${idx + 1}. ${this.formatMathToImages(q.question)}</p>`;
                                if (q.options && q.options.length > 0) {
                                    // 選項也要轉
                                    const formattedOptions = q.options.map(opt => this.formatMathToImages(opt)).join('　　');
                                    docHTML += `<p style="font-size: 14pt; margin-left: 25px;">${formattedOptions}</p>`;
                                }
                                if (tName === '計算題') docHTML += `<br><br><br><br><br><br><br>`;
                                else if (tName === '填充題') docHTML += `<br><br>`;
                            });
                        }
                    });

                    // --- 2. 輸出作答網格區 ---
                    docHTML += `<br><br><p style="text-align: center; font-size: 12pt; letter-spacing: 2px;">---------------------------------------作答分隔線---------------------------------------</p><br>`;
                    
                    if (groupedQs['選擇題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold;">單選題答題區（每題 ${getScore('選擇題')} 分）</p>`;
                        docHTML += `<table class="ans-table">`;
                        let count = groupedQs['選擇題'].length;
                        let cols = 5; 
                        for (let i = 0; i < count; i += cols) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < cols; j++) { if (i + j < count) docHTML += `<td>${i + j + 1}.</td>`; else docHTML += `<td></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < cols; j++) docHTML += `<td></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table><br>`;
                    }

                    if (groupedQs['填充題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold;">填充題答題區（每格 ${getScore('填充題')} 分）</p>`;
                        docHTML += `<table class="ans-table">`;
                        let count = groupedQs['填充題'].length;
                        let cols = 4; 
                        for (let i = 0; i < count; i += cols) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < cols; j++) { if (i + j < count) docHTML += `<td>(${i + j + 1})</td>`; else docHTML += `<td></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < cols; j++) docHTML += `<td></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table><br>`;
                    }
                }

                // --- 3. 輸出解答與詳解區 ---
                if (this.exportOptions.correctAnswers || this.exportOptions.detailedSolutions) {
                    docHTML += `<br style="page-break-before: always; clear: both;" />`; // 強制換頁
                    docHTML += `<h2 style="text-align: center; color: red;">教師版解答與解析</h2><hr>`;
                    
                    ['選擇題', '填充題', '計算題'].forEach(tName => {
                        if (groupedQs[tName].length > 0) {
                            docHTML += `<h3>【${tName}】</h3>`;
                            groupedQs[tName].forEach((q, idx) => {
                                docHTML += `<p style="font-size: 14pt; line-height: 1.5;"><b>第 ${idx + 1} 題：</b><br>`;
                                if (this.exportOptions.correctAnswers) docHTML += `<span style="color: red; font-weight: bold;">[解答] ${this.formatMathToImages(q.answer || '無')}</span><br>`;
                                if (this.exportOptions.detailedSolutions) docHTML += `[詳解] ${this.formatMathToImages(q.solution || '無')}`;
                                docHTML += `</p>`;
                            });
                        }
                    });
                }

                docHTML += `</div></body></html>`;

                const fileName = `${this.exam.school}_${this.exam.name}_數學考卷(B4).doc`;
                this.downloadDocFile(docHTML, fileName);

                statusDiv.innerText = "✅ 考卷生成成功！(B4版面且包含公式圖片)，請至「下載」資料夾查看。";
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                }, 1500);

            } catch (error) {
                console.error(error);
                alert("生成失敗，請確認 API Key 是否正確，或檔案是否不支援。\n錯誤訊息：" + error.message);
                btn.innerHTML = originalHTML;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                statusDiv.innerText = "❌ 發生錯誤，請重試。";
            }
        }
    }
}).mount('#app');
</script>

</body>
</html>
