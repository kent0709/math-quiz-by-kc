<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學出題小幫手 (排版穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0fdfa; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px;}
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-checkbox { appearance: none; width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 4px; cursor: pointer; vertical-align: middle;}
        .custom-checkbox:checked { background-color: #0d9488; border-color: #0d9488; }
        .box-radio { appearance: none; width: 14px; height: 14px; border: 1.5px solid #000; cursor: pointer; vertical-align: middle;}
        .box-radio:checked { background-color: #000; }
    </style>
</head>
<body class="text-gray-800 pb-10">

<div id="app" class="max-w-4xl mx-auto pt-10 px-4">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black text-teal-600 mb-2">數學出題小幫手</h1>
        <p class="text-gray-500">第一、二頁精準排版版</p>
    </div>

    <div class="glass-card flex items-center">
        <i class="fas fa-key text-amber-500 text-xl mr-3"></i>
        <div class="flex-grow">
            <input type="password" v-model="apiKey" @change="saveApiKey" placeholder="輸入 Google API 金鑰 (AIza...)" class="w-full border-b border-gray-300 focus:border-teal-500 outline-none py-1">
        </div>
        <div v-if="apiKey" class="ml-3 text-green-500 text-sm font-bold">已設定</div>
    </div>

    <div class="glass-card">
        <h2 class="text-lg font-bold mb-4 border-l-4 border-teal-500 pl-2">1. 考卷表頭資訊</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label class="text-sm text-gray-500">學校名稱</label><input v-model="exam.school" class="w-full border p-2 rounded"></div>
            <div><label class="text-sm text-gray-500">學年度</label><input v-model="exam.year" type="number" class="w-full border p-2 rounded"></div>
            <div><label class="text-sm text-gray-500">學期</label><input v-model="exam.semester" type="number" class="w-full border p-2 rounded"></div>
            <div><label class="text-sm text-gray-500">考試名稱</label><input v-model="exam.name" class="w-full border p-2 rounded"></div>
        </div>
        <div class="flex gap-6 mt-4">
            <div>
                <label class="text-sm text-gray-500 block mb-1">科別</label>
                <label class="mr-2"><input type="radio" v-model="exam.dept" value="工科" class="box-radio">工科</label>
                <label class="mr-2"><input type="radio" v-model="exam.dept" value="商科" class="box-radio">商科</label>
            </div>
            <div>
                <label class="text-sm text-gray-500 block mb-1">年級</label>
                <label class="mr-2"><input type="radio" v-model="exam.grade" value="高一" class="box-radio">高一</label>
                <label class="mr-2"><input type="radio" v-model="exam.grade" value="高二" class="box-radio">高二</label>
                <label class="mr-2"><input type="radio" v-model="exam.grade" value="高三" class="box-radio">高三</label>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h2 class="text-lg font-bold mb-4 border-l-4 border-teal-500 pl-2">2. 題型與素材設定</h2>
        <div class="mb-4">
            <textarea v-model="examRules" rows="3" class="w-full border p-2 rounded" placeholder="輸入出題要求..."></textarea>
        </div>
        <div class="space-y-3">
            <div v-for="(type, index) in questionTypes" :key="index" class="flex items-center gap-4">
                <input type="checkbox" v-model="type.enabled" class="custom-checkbox">
                <span class="font-bold w-20">{{ type.name }}</span>
                <input type="number" v-model="type.count" class="w-16 border p-1 text-center" placeholder="題數"> 題
                <input type="number" v-model="type.score" class="w-16 border p-1 text-center" placeholder="配分"> 分/題
            </div>
        </div>
    </div>

    <div class="text-center mt-8">
        <button @click="generateExam" class="bg-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg hover:bg-teal-700 text-xl">
            <i class="fas fa-file-word mr-2"></i> 開始產生 Word 考卷 (.doc)
        </button>
        <div id="status-message" class="mt-4 text-red-600 font-bold text-lg"></div>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            exam: { school: '三重商工', year: '114', semester: '2', name: '第一次期中考', dept: '工科', grade: '高二', useCard: false, specialNeeds: false },
            examRules: '範圍：高中數學。請務必使用 $ 包住所有的數學公式與數字。',
            questionTypes: [
                { name: '選擇題', enabled: true, count: 10, score: 6 },
                { name: '填充題', enabled: true, count: 8, score: 5 },
                { name: '計算題', enabled: false, count: 0, score: 10 }
            ]
        }
    },
    methods: {
        saveApiKey() { localStorage.setItem('gemini_api_key', this.apiKey); },

        // 轉換數學公式為 MathML
        formatMath(text) {
            if (!text) return '';
            let res = text.replace(/\n/g, '<br>');
            
            const toMathML = (tex) => {
                try {
                    const html = katex.renderToString(tex, { output: 'mathml', throwOnError: false });
                    const match = html.match(/<math[^>]*>([\s\S]*?)<\/math>/i);
                    if (match) {
                        let clean = match[1].replace(/<annotation[^>]*>[\s\S]*?<\/annotation>/gi, '').replace(/<\/?semantics[^>]*>/gi, '');
                        return `<math xmlns="http://www.w3.org/1998/Math/MathML">${clean}</math>`;
                    }
                    return tex;
                } catch(e) { return tex; }
            };

            res = res.replace(/\$\$([\s\S]+?)\$\$/g, (m, tex) => toMathML(tex.trim()));
            res = res.replace(/\$([\s\S]+?)\$/g, (m, tex) => toMathML(tex.trim()));
            return res;
        },

        // 【精準排版】第一頁表頭 (無姓名)
        getHeaderPage1() {
            return `
            <table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; margin-bottom: 10px;">
                <tr>
                    <td align="center" style="font-size: 20pt; font-weight: bold; color: red;">
                        ${this.exam.school} ${this.exam.year}學年第${this.exam.semester}學期 ${this.exam.name}
                    </td>
                    <td rowspan="2" width="120" style="font-size: 12pt; line-height: 1.5; padding: 10px;">
                        科目：<b>數學</b><br>
                        ${this.exam.useCard?'■':'□'}使用答案卡<br>
                        ${!this.exam.useCard?'■':'□'}不使用答案卡<br>
                        ${this.exam.specialNeeds?'■':'□'}特殊生考卷
                    </td>
                </tr>
                <tr>
                    <td style="font-size: 12pt; padding: 10px;">
                        科別：${this.exam.dept==='工科'?'■':'□'}工科　${this.exam.dept==='商科'?'■':'□'}商科　${this.exam.dept==='體育科'?'■':'□'}體育科
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        年級：${this.exam.grade==='高一'?'■':'□'}高一　${this.exam.grade==='高二'?'■':'□'}高二　${this.exam.grade==='高三'?'■':'□'}高三
                    </td>
                </tr>
            </table>
            <p style="text-align: right; font-size: 12pt; margin-top: 0; margin-bottom: 10px;">注意：請將答案填入背面作答區！！</p>
            `;
        },

        // 【精準排版】第二頁表頭 (有姓名與總分框)
        getHeaderPage2() {
            return `
            <table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; margin-bottom: 10px;">
                <tr>
                    <td align="center" style="font-size: 20pt; font-weight: bold; color: red;">
                        ${this.exam.school} ${this.exam.year}學年第${this.exam.semester}學期 ${this.exam.name}
                    </td>
                    <td rowspan="2" width="120" style="font-size: 12pt; line-height: 1.5; padding: 10px;">
                        科目：<b>數學</b><br>
                        ${this.exam.useCard?'■':'□'}使用答案卡<br>
                        ${!this.exam.useCard?'■':'□'}不使用答案卡<br>
                        ${this.exam.specialNeeds?'■':'□'}特殊生考卷
                    </td>
                    <td rowspan="3" width="80" align="center" valign="middle" style="font-size: 14pt; font-weight: bold;">
                        (總 分)
                    </td>
                </tr>
                <tr>
                    <td style="font-size: 12pt; padding: 10px;">
                        科別：${this.exam.dept==='工科'?'■':'□'}工科　${this.exam.dept==='商科'?'■':'□'}商科　${this.exam.dept==='體育科'?'■':'□'}體育科
                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        年級：${this.exam.grade==='高一'?'■':'□'}高一　${this.exam.grade==='高二'?'■':'□'}高二　${this.exam.grade==='高三'?'■':'□'}高三
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="font-size: 14pt; padding: 10px;">
                        班級：＿＿＿＿＿　　學號：＿＿＿＿＿　　姓名：＿＿＿＿＿＿＿＿
                    </td>
                </tr>
            </table>
            `;
        },

        async generateExam(event) {
            if (!this.apiKey) { alert('請先輸入 API Key！'); return; }
            
            const btn = event.currentTarget;
            const status = document.getElementById('status-message');
            const origHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在生成考卷，請稍候...';
            status.innerText = '';

            try {
                const activeTypes = this.questionTypes.filter(t => t.enabled).map(t => `${t.name}: ${t.count}題`).join(', ');
                const prompt = `請出一份數學考卷，必須回傳純 JSON 格式。
【題型】：${activeTypes}
【要求】：${this.examRules}
⚠️ 絕對禁止純文字數學！所有數學符號、數字、矩陣，必須用單個 $ 包住。
格式：
{
  "questions": [
    { "type": "選擇題", "question": "問題", "options": ["(A)", "(B)", "(C)", "(D)"], "answer": "A", "solution": "詳解" }
  ]
}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${this.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const quizData = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // 整理所有題目成一個陣列
                let allQuestions = [];
                const groupedQs = { '選擇題': [], '填充題': [], '計算題': [] };
                if(quizData.questions) quizData.questions.forEach(q => { if(groupedQs[q.type]) groupedQs[q.type].push(q); });
                const getScore = (tName) => { const t = this.questionTypes.find(x => x.name === tName); return t ? parseInt(t.score) || 0 : 0; };
                
                let sectionNum = ['一', '二', '三'];
                let sectionIdx = 0;

                ['選擇題', '填充題', '計算題'].forEach(tName => {
                    if (groupedQs[tName].length > 0) {
                        let score = getScore(tName);
                        allQuestions.push({ isHeader: true, html: `<p style="font-size: 16pt; font-weight: bold; margin-top: 15px;">${sectionNum[sectionIdx]}、${tName}（每題 ${score} 分）</p>` });
                        sectionIdx++;
                        
                        groupedQs[tName].forEach((q, idx) => {
                            let qHtml = `<p style="font-size: 14pt; margin: 8px 0;">${idx + 1}. ${this.formatMath(q.question)}</p>`;
                            if (q.options && q.options.length > 0) {
                                qHtml += `<p style="font-size: 14pt; margin-left: 20px;">${q.options.map(opt => this.formatMath(opt)).join('　　')}</p>`;
                            }
                            if (tName === '計算題') qHtml += `<br><br><br>`;
                            allQuestions.push({ isHeader: false, html: qHtml });
                        });
                    }
                });

                // ==========================================
                // 【核心排版邏輯】：將題目切成兩半
                // ==========================================
                let totalQs = allQuestions.filter(q => !q.isHeader).length;
                let midPoint = Math.ceil(totalQs / 2);
                
                let part1HTML = "";
                let part2HTML = "";
                let qCount = 0;

                allQuestions.forEach(q => {
                    if (!q.isHeader) qCount++;
                    // 若還沒超過一半，或者剛好是標題且後面的題目屬於前半段，就放第一頁
                    if (qCount <= midPoint || (q.isHeader && qCount < midPoint)) {
                        part1HTML += q.html;
                    } else {
                        part2HTML += q.html;
                    }
                });

                // ==========================================
                // 組合 Word 檔案
                // ==========================================
                let docHTML = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                <meta charset="utf-8">
                <style>
                    body { font-family: '標楷體', 'Times New Roman', serif; font-size: 14pt; }
                </style>
                </head><body>`;

                // --- 【第一頁】 ---
                docHTML += this.getHeaderPage1();
                docHTML += part1HTML;

                // 強制換頁
                docHTML += `<br clear="all" style="page-break-before:always" />`;

                // --- 【第二頁】 ---
                docHTML += this.getHeaderPage2();
                docHTML += part2HTML;
                
                // --- 【第二頁最下方：作答格子】 ---
                docHTML += `<br><p style="text-align: center; letter-spacing: 2px; font-size: 12pt;">------------------------------作答區------------------------------</p>`;

                if (groupedQs['選擇題'].length > 0) {
                    docHTML += `<p style="font-weight: bold; font-size: 14pt;">單選題答題區</p>`;
                    docHTML += `<table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; text-align: center; margin-bottom: 20px;">`;
                    let count = groupedQs['選擇題'].length;
                    for (let i = 0; i < count; i += 5) {
                        docHTML += `<tr>`;
                        for (let j = 0; j < 5; j++) { if (i + j < count) docHTML += `<td width="20%">${i + j + 1}.</td>`; else docHTML += `<td width="20%"></td>`; }
                        docHTML += `</tr><tr>`;
                        for (let j = 0; j < 5; j++) docHTML += `<td style="height:50px;"></td>`;
                        docHTML += `</tr>`;
                    }
                    docHTML += `</table>`;
                }

                if (groupedQs['填充題'].length > 0) {
                    docHTML += `<p style="font-weight: bold; font-size: 14pt;">填充題答題區</p>`;
                    docHTML += `<table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; text-align: center;">`;
                    let count = groupedQs['填充題'].length;
                    for (let i = 0; i < count; i += 4) {
                        docHTML += `<tr>`;
                        for (let j = 0; j < 4; j++) { if (i + j < count) docHTML += `<td width="25%">(${i + j + 1})</td>`; else docHTML += `<td width="25%"></td>`; }
                        docHTML += `</tr><tr>`;
                        for (let j = 0; j < 4; j++) docHTML += `<td style="height:50px;"></td>`;
                        docHTML += `</tr>`;
                    }
                    docHTML += `</table>`;
                }

                // --- 【第三頁：解答】 ---
                docHTML += `<br clear="all" style="page-break-before:always" />`;
                docHTML += `<h2 style="text-align: center; color: red;">教師版解答與解析</h2><hr>`;
                ['選擇題', '填充題', '計算題'].forEach(tName => {
                    if (groupedQs[tName].length > 0) {
                        docHTML += `<h3>${tName}</h3>`;
                        groupedQs[tName].forEach((q, idx) => {
                            docHTML += `<p><b>第 ${idx + 1} 題：</b> 解答：${this.formatMath(q.answer)}<br>詳解：${this.formatMath(q.solution)}</p>`;
                        });
                    }
                });

                docHTML += `</body></html>`;

                // 產生並下載檔案
                const blob = new Blob(['\ufeff', docHTML], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${this.exam.school}_${this.exam.name}_數學考卷.doc`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                btn.innerHTML = origHTML;
                status.innerHTML = `✅ 考卷生成成功！已下載。打開 Word 如果跳出警告請按「是」。`;

            } catch (error) {
                console.error(error);
                btn.innerHTML = origHTML;
                status.innerText = `❌ 發生錯誤：${error.message}`;
            }
        }
    }
}).mount('#app');
</script>

</body>
</html>
