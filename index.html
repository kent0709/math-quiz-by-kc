<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學出題小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%); min-height: 100vh; }
        .exam-font { font-family: 'Noto Serif TC', serif; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .box-radio { appearance: none; width: 14px; height: 14px; border: 1.5px solid #000; display: inline-block; position: relative; cursor: pointer; top: 2px;}
        .box-radio:checked { background-color: #000; }
        .custom-checkbox { appearance: none; width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 6px; display: inline-block; position: relative; cursor: pointer; transition: all 0.2s;}
        .custom-checkbox:checked { background-color: #0d9488; border-color: #0d9488; }
        .custom-checkbox:checked::after { content: ''; position: absolute; left: 7px; top: 3px; width: 5px; height: 11px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
        .exam-table { border: 2px solid #000; border-collapse: collapse; width: 100%; background: #fff; }
        .exam-table td { border: 1px solid #000; padding: 12px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-gray-800 pb-10 flex flex-col items-center">

<div id="app" class="w-full max-w-5xl px-4 pt-12 pb-6">
    <div class="text-center mb-8">
        <h1 class="text-5xl md:text-6xl font-black mb-4 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-cyan-600 drop-shadow-sm">
            <i class="fas fa-cube text-teal-500 mr-3 text-4xl"></i>數學出題小幫手
        </h1>
        <p class="text-gray-500 text-lg font-medium tracking-wide">終極修復版：完美 Word 2010 支援</p>
    </div>

    <div class="glass-card rounded-xl p-4 mb-8 border-l-4 border-amber-400 max-w-2xl mx-auto relative">
        <div class="flex items-center w-full">
            <i class="fas fa-key text-amber-500 text-xl mr-3"></i>
            <div class="flex-grow">
                <label class="text-xs font-bold text-gray-500">Gemini API Key (僅儲存於本地)</label>
                <input type="password" v-model="apiKey" @change="saveApiKey" placeholder="輸入 _AIza_ 開頭的 API 金鑰..." class="w-full bg-transparent border-b border-gray-300 focus:border-teal-500 outline-none text-gray-700 py-2 text-sm font-mono mt-1">
            </div>
            <div v-if="apiKey" class="ml-3 text-green-500 text-sm font-bold flex items-center whitespace-nowrap">
                <i class="fas fa-check-circle mr-1"></i> 已設定
            </div>
        </div>
    </div>

    <div class="space-y-8">
        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">1</span>
                考卷表頭資訊
            </h2>
            <div class="overflow-x-auto rounded-lg shadow-sm">
                <table class="exam-table exam-font text-black min-w-[700px]">
                    <tr>
                        <td colspan="2" class="text-center text-3xl font-bold text-red-600 tracking-widest py-8">
                            <input v-model="exam.school" class="w-36 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <input v-model="exam.year" type="number" class="w-20 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <span class="text-2xl pt-1">學年第</span>
                            <input v-model="exam.semester" type="number" class="w-12 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 transition">
                            <span class="text-2xl pt-1">學期</span>
                            <input v-model="exam.name" class="w-56 bg-transparent text-center border-b-2 border-dashed border-red-200 hover:bg-red-50 focus:outline-none focus:border-red-500 ml-4 transition">
                        </td>
                        <td rowspan="2" class="align-middle p-0 w-48 bg-gray-50/50">
                            <div class="flex flex-col h-full">
                                <div class="border-b border-black p-3 text-center font-bold text-lg tracking-widest">科目：數學</div>
                                <div class="p-4 text-base leading-relaxed flex-grow flex flex-col justify-center space-y-2">
                                    <label class="cursor-pointer block hover:text-teal-700 transition"><input type="radio" v-model="exam.useCard" :value="true" class="box-radio mr-2"> 使用答案卡</label>
                                    <label class="cursor-pointer block hover:text-teal-700 transition"><input type="radio" v-model="exam.useCard" :value="false" class="box-radio mr-2"> 不使用答案卡</label>
                                    <label class="cursor-pointer block hover:text-teal-700 transition"><input type="checkbox" v-model="exam.specialNeeds" class="box-radio mr-2"> 特殊生考卷</label>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-base p-4">
                            <span class="font-bold mr-2">科別：</span>
                            <label class="cursor-pointer mr-4 hover:text-teal-700"><input type="radio" v-model="exam.dept" value="工科" class="box-radio mr-1">工科</label>
                            <label class="cursor-pointer mr-4 hover:text-teal-700"><input type="radio" v-model="exam.dept" value="商科" class="box-radio mr-1">商科</label>
                            <label class="cursor-pointer hover:text-teal-700"><input type="radio" v-model="exam.dept" value="體育科" class="box-radio mr-1">體育科</label>
                        </td>
                        <td class="text-base p-4">
                            <label class="cursor-pointer mr-6 hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高一" class="box-radio mr-1">高一</label>
                            <label class="cursor-pointer mr-6 hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高二" class="box-radio mr-1">高二</label>
                            <label class="cursor-pointer hover:text-teal-700"><input type="radio" v-model="exam.grade" value="高三" class="box-radio mr-1">高三</label>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">2</span>
                分區匯入素材與出題要求
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="border-2 border-dashed border-blue-300 rounded-2xl p-6 flex flex-col items-center justify-center bg-blue-50/50 hover:bg-blue-100 transition cursor-pointer relative min-h-[140px]">
                    <input type="file" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.jpg,.png,.jpeg" @change="handleTextbookUpload">
                    <div v-if="textbookFiles.length === 0" class="text-center">
                        <i class="fas fa-book text-4xl text-blue-500 mb-3"></i>
                        <h3 class="text-blue-800 font-bold">上傳課本 / 習作</h3>
                    </div>
                    <div v-else class="text-center w-full">
                        <i class="fas fa-check-circle text-3xl text-blue-600 mb-2"></i>
                        <h3 class="text-blue-800 font-bold text-sm mb-1">已匯入 {{ textbookFiles.length }} 份素材</h3>
                        <button @click.stop="textbookFiles = []" class="mt-2 text-xs bg-white text-red-500 px-3 py-1 rounded-full shadow-sm relative z-10">重新上傳</button>
                    </div>
                </div>
                <div class="border-2 border-dashed border-green-300 rounded-2xl p-6 flex flex-col items-center justify-center bg-green-50/50 hover:bg-green-100 transition cursor-pointer relative min-h-[140px]">
                    <input type="file" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.jpg,.png,.jpeg" @change="handleExamUpload">
                    <div v-if="examFiles.length === 0" class="text-center">
                        <i class="fas fa-file-signature text-4xl text-green-500 mb-3"></i>
                        <h3 class="text-green-800 font-bold">上傳補充考卷 / 題庫</h3>
                    </div>
                    <div v-else class="text-center w-full">
                        <i class="fas fa-check-circle text-3xl text-green-600 mb-2"></i>
                        <h3 class="text-green-800 font-bold text-sm mb-1">已匯入 {{ examFiles.length }} 份素材</h3>
                        <button @click.stop="examFiles = []" class="mt-2 text-xs bg-white text-red-500 px-3 py-1 rounded-full shadow-sm relative z-10">重新上傳</button>
                    </div>
                </div>
            </div>
            
            <div class="mb-6 bg-yellow-50/50 p-5 rounded-xl border border-yellow-200">
                <label class="block text-base font-bold text-gray-700 mb-3 flex items-center">
                    <i class="fas fa-bullseye text-red-500 mr-2"></i> 指定出題單元 / 範圍縮小
                </label>
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <input v-model="targetUnit" type="text" placeholder="文字描述 (例如：只考第三單元 矩陣)" class="flex-grow w-full text-sm md:text-base border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-yellow-400 outline-none text-gray-800 bg-white">
                </div>
            </div>

            <div class="bg-gray-50/50 rounded-xl p-6 border border-gray-100">
                <label class="block text-base font-bold text-gray-700 mb-3 flex items-center">
                    <i class="fas fa-clipboard-check text-teal-500 mr-2"></i> 出題原則與要求
                </label>
                <textarea v-model="examRules" rows="11" class="w-full text-sm border border-gray-200 rounded-xl p-4 outline-none leading-relaxed text-gray-700 bg-white shadow-inner"></textarea>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 md:p-8 border-l-8 border-l-teal-500">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-teal-100 text-teal-700 rounded-full w-8 h-8 flex items-center justify-center text-base mr-3 shadow-sm">3</span>
                題型與配分設定
            </h2>
            <div class="space-y-5">
                <div v-for="(type, index) in questionTypes" :key="index" class="border border-gray-200 rounded-xl p-5 md:p-6 shadow-sm" :class="type.enabled ? 'bg-white' : 'bg-gray-50/60 opacity-70 grayscale-[30%]'">
                    <div class="flex items-center mb-5">
                        <input type="checkbox" v-model="type.enabled" class="custom-checkbox mr-4">
                        <span class="font-bold text-gray-800 text-xl">{{ type.name }}</span>
                    </div>
                    <div v-if="type.enabled" class="flex flex-wrap md:flex-nowrap items-center gap-6 pl-10">
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-500">題數</span>
                            <input type="number" v-model="type.count" class="w-20 border border-gray-300 rounded-lg p-2.5 text-center outline-none font-bold text-gray-700">
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-500">每題配分</span>
                            <input type="number" v-model="type.score" class="w-20 border border-gray-300 rounded-lg p-2.5 text-center outline-none font-bold text-gray-700 bg-white">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 mb-8 text-center bg-white/50 backdrop-blur-md rounded-3xl p-8 border border-white shadow-xl">
            <div class="flex justify-center flex-wrap gap-5 mb-8">
                <label class="flex items-center cursor-pointer font-bold text-gray-600 hover:text-teal-600 bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100">
                    <input type="checkbox" v-model="exportOptions.examPaper" class="custom-checkbox mr-3">
                    <i class="fas fa-file-alt mr-2 text-teal-500 text-lg"></i> 1. 試題考卷 (完美分頁排版)
                </label>
                <label class="flex items-center cursor-pointer font-bold text-gray-600 hover:text-blue-600 bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100">
                    <input type="checkbox" v-model="exportOptions.correctAnswers" class="custom-checkbox mr-3">
                    <i class="fas fa-check-circle mr-2 text-blue-500 text-lg"></i> 2. 教師解答卷
                </label>
            </div>

            <button @click="generateExam" class="bg-gradient-to-r from-teal-500 to-cyan-600 text-white px-12 py-5 rounded-2xl text-2xl font-black shadow-lg hover:scale-105 transition-all duration-300 w-full md:w-auto inline-flex items-center justify-center">
                <i class="fas fa-file-word mr-4 text-3xl"></i> 產生完美 WORD 考卷 (.doc)
            </button>
            <p class="text-red-500 font-bold text-sm mt-4 tracking-wide"><i class="fas fa-exclamation-triangle mr-1"></i> 請注意：下載後打開若出現「檔案格式警告」，請放心點擊「是(Y)」，Word 即會載入排版！</p>
            
            <div id="status-message" class="text-sm font-bold mt-4 text-teal-700 h-6"></div>
        </div>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            exam: { school: '三重商工', year: '114', semester: '2', name: '第一次期中考', dept: '工科', grade: '高二', useCard: false, specialNeeds: false },
            textbookFiles: [], examFiles: [], scopeFiles: [], targetUnit: '',
            examRules: `1. 至少 70%為課本、習作為出題標準\n2. 數據可改\n3. 選擇題至少佔 40 分\n4. 範圍題型平均分佈，一種觀念以三題為上限\n5. 題幹明確：題幹完整，避免過短或過長。\n6. 誘答力：錯誤選項要具似真性。\n7. 避免暗示。\n8. 用詞明確。\n9. 無歧視性。\n10. 排版清晰。`,
            questionTypes: [
                { name: '選擇題', enabled: true, count: 10, score: 6, difficulty: '中階' },
                { name: '填充題', enabled: true, count: 8, score: 5, difficulty: '中階' },
                { name: '計算題', enabled: false, count: 0, score: 10, difficulty: '中階' }
            ],
            exportOptions: { examPaper: true, correctAnswers: true }
        }
    },
    methods: {
        saveApiKey() { localStorage.setItem('gemini_api_key', this.apiKey); },
        handleTextbookUpload(event) { if (event.target.files.length > 0) this.textbookFiles = Array.from(event.target.files); },
        handleExamUpload(event) { if (event.target.files.length > 0) this.examFiles = Array.from(event.target.files); },
        handleScopeUpload(event) { if (event.target.files.length > 0) this.scopeFiles = Array.from(event.target.files); },
        
        async fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ inlineData: { data: reader.result.split(',')[1], mimeType: file.type } });
                reader.onerror = error => reject(error);
            });
        },
        
        // 🔥 終極核心：先提取公式 ➔ 處理換行 ➔ 轉 MathML ➔ 塞回，保證多行矩陣不會被 <br> 破壞！
        formatMathToWord(text) {
            if (!text) return '';

            // 第一步：用佔位符把公式安全隔離
            let mathBlocks = [];
            let placeholderText = text;
            
            const convertToMathML = (tex) => {
                try {
                    let cleanTex = tex.replace(/\\\\/g, '\\');
                    const html = katex.renderToString(cleanTex, { throwOnError: false, output: 'mathml', displayMode: false });
                    let match = html.match(/<math[^>]*>([\s\S]*?)<\/math>/i);
                    if (match) {
                        let innerContent = match[1];
                        // 剝除干擾 Word 的標籤
                        innerContent = innerContent.replace(/<annotation[^>]*>[\s\S]*?<\/annotation>/gi, '');
                        innerContent = innerContent.replace(/<\/?semantics[^>]*>/gi, '');
                        // 產生最標準的 MathML 2.0，Word 2010 完美支援
                        return `<math xmlns="http://www.w3.org/1998/Math/MathML">${innerContent}</math>`;
                    }
                    return tex;
                } catch (e) { return tex; }
            };

            // 擷取 $$...$$ 和 $...$
            placeholderText = placeholderText.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                mathBlocks.push(convertToMathML(p1.trim()));
                return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
            });
            placeholderText = placeholderText.replace(/\$([\s\S]+?)\$/g, (match, p1) => {
                mathBlocks.push(convertToMathML(p1.trim()));
                return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
            });

            // 第二步：安全的將剩下的文字換行轉為 <br>
            let result = placeholderText.replace(/\n/g, '<br>');

            // 第三步：將完美轉換的 MathML 塞回原本的位置
            mathBlocks.forEach((block, idx) => {
                result = result.replace(`__MATH_BLOCK_${idx}__`, block);
            });

            return result;
        },

        downloadDocFile(htmlContent, filename) {
            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        },

        // 🔥 終極鐵壁表頭：捨棄 CSS class，全部寫入 inline HTML 屬性
        getHeaderHTML(isAnswerPage) {
            const sc = this.exam.school, yr = this.exam.year, sm = this.exam.semester, nm = this.exam.name;
            const uc = this.exam.useCard, sn = this.exam.specialNeeds;
            const dp = this.exam.dept, gr = this.exam.grade;

            if (!isAnswerPage) {
                return `
                <table style="width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px;">
                    <tr>
                        <td style="width: 70%; border: 1.5pt solid windowtext; text-align: center; padding: 15px;">
                            <span style="font-size: 20pt; font-weight: bold; color: red;">${sc}　${yr} 學年第 ${sm} 學期　${nm}</span>
                        </td>
                        <td style="width: 30%; border: 1.5pt solid windowtext; padding: 10px; font-size: 12pt; line-height: 1.5;" rowspan="2">
                            科目：<b>數學</b><br>
                            ${uc ? '■' : '□'}使用答案卡<br>
                            ${!uc ? '■' : '□'}不使用答案卡<br>
                            ${sn ? '■' : '□'}特殊生考卷
                        </td>
                    </tr>
                    <tr>
                        <td style="width: 70%; border: 1.5pt solid windowtext; padding: 0;">
                            <table style="width: 100%; border-collapse: collapse; border: none;">
                                <tr>
                                    <td style="width: 50%; border-right: 1.5pt solid windowtext; padding: 10px; font-size: 12pt;">
                                        科別：${dp==='工科'?'■':'□'}工科、${dp==='商科'?'■':'□'}商科、${dp==='體育科'?'■':'□'}體育科
                                    </td>
                                    <td style="width: 50%; padding: 10px; font-size: 12pt;">
                                        ${gr==='高一'?'■':'□'}高一、${gr==='高二'?'■':'□'}高二、${gr==='高三'?'■':'□'}高三
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
                <p style="text-align: right; font-size: 12pt; margin: 0 0 10px 0;">注意：請將答案填入背面作答區！！</p>
                `;
            } else {
                return `
                <table style="width: 100%; border-collapse: collapse; border: none; margin-bottom: 10px;">
                    <tr>
                        <td style="width: 60%; border: 1.5pt solid windowtext; text-align: center; padding: 15px;">
                            <span style="font-size: 20pt; font-weight: bold; color: red;">${sc}　${yr} 學年第 ${sm} 學期　${nm}</span>
                        </td>
                        <td style="width: 25%; border: 1.5pt solid windowtext; padding: 10px; font-size: 12pt; line-height: 1.5;" rowspan="2">
                            科目：<b>數學</b><br>
                            ${uc ? '■' : '□'}使用答案卡<br>
                            ${!uc ? '■' : '□'}不使用答案卡<br>
                            ${sn ? '■' : '□'}特殊生考卷
                        </td>
                        <td style="width: 15%; border: 1.5pt solid windowtext; text-align: center; vertical-align: top; padding-top: 15px; font-size: 14pt; font-weight: bold;" rowspan="3">
                            (總　分)
                        </td>
                    </tr>
                    <tr>
                        <td style="width: 60%; border: 1.5pt solid windowtext; padding: 0;">
                            <table style="width: 100%; border-collapse: collapse; border: none;">
                                <tr>
                                    <td style="width: 50%; border-right: 1.5pt solid windowtext; padding: 10px; font-size: 12pt;">
                                        科別：${dp==='工科'?'■':'□'}工科、${dp==='商科'?'■':'□'}商科、${dp==='體育科'?'■':'□'}體育科
                                    </td>
                                    <td style="width: 50%; padding: 10px; font-size: 12pt;">
                                        ${gr==='高一'?'■':'□'}高一、${gr==='高二'?'■':'□'}高二、${gr==='高三'?'■':'□'}高三
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" style="border: 1.5pt solid windowtext; padding: 15px 10px; font-size: 14pt;">
                            <span style="display:inline-block; width:30%;">班級：</span>
                            <span style="display:inline-block; width:30%;">學號：</span>
                            <span style="display:inline-block; width:30%;">姓名：</span>
                        </td>
                    </tr>
                </table>
                `;
            }
        },

        async generateExam(event) {
            if (!this.apiKey) { alert('⚠️ 請先輸入 Gemini API Key！'); return; }
            if (this.textbookFiles.length === 0 && this.examFiles.length === 0 && !this.targetUnit && this.scopeFiles.length === 0) {
                alert('⚠️ 請至少上傳一份素材，或指定出題範圍！'); return;
            }

            const btn = event.currentTarget;
            const statusDiv = document.getElementById('status-message');
            const originalHTML = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-3 text-3xl"></i> AI 正在讀取並生成題目...';
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                statusDiv.innerText = "正在處理檔案，請稍候...";

                let contentsParts = [];
                const activeTypes = this.questionTypes.filter(t => t.enabled).map(t => `${t.name}: ${t.count}題 (${t.difficulty})`).join(', ');
                
                const promptText = `您是一位專業的高中數學老師。請根據指示與素材出一份全新考卷。
【題型配置】：${activeTypes}
⚠️【極致洗牌】：絕對禁止一對一照抄原題換數字！請打散洗牌，強烈建議將原本的選擇題改編為填充題！

⚠️【致命錯誤防範：數學公式強制規範 (極重要)】：
1. 所有數字(1,2)、變數(x,n)、座標(P(0,1))、方程式、極限、矩陣、排列組合，【全部】都要用單個 $ 包住！(正確示範：點 $P(0,1,0)$)
2. 絕對禁止用鍵盤符號 (如 ∣, ⃗, ×) 來拼湊數學！
3. 向量必須寫成 \\vec{u}，外積寫成 \\vec{u} \\times \\vec{v}。
4. 行列式必須使用 \\begin{vmatrix} ... \\end{vmatrix}，矩陣使用 \\begin{pmatrix} ... \\end{pmatrix}。
5. 排列與組合必須寫成 P_n^3 或 C_n^2。`;

                contentsParts.push({ text: promptText });
                
                if(this.scopeFiles.length > 0) {
                    contentsParts.push({ text: "--- 以下為【指定出題單元/範圍參考圖】 ---" });
                    const parts = await Promise.all(this.scopeFiles.map(f => this.fileToBase64(f)));
                    contentsParts.push(...parts);
                }
                if(this.textbookFiles.length > 0) {
                    contentsParts.push({ text: "--- 以下為【課本/習作】素材 ---" });
                    const parts = await Promise.all(this.textbookFiles.map(f => this.fileToBase64(f)));
                    contentsParts.push(...parts);
                }
                if(this.examFiles.length > 0) {
                    contentsParts.push({ text: "--- 以下為【舊考卷/補充】素材 ---" });
                    const parts = await Promise.all(this.examFiles.map(f => this.fileToBase64(f)));
                    contentsParts.push(...parts);
                }

                // 🌟 使用 Google 原生 Schema 保證 JSON 完美輸出
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${this.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: contentsParts }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    questions: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                type: { type: "STRING" },
                                                question: { type: "STRING" },
                                                options: { type: "ARRAY", items: { type: "STRING" } },
                                                answer: { type: "STRING" },
                                                solution: { type: "STRING" }
                                            },
                                            required: ["type", "question", "answer", "solution"]
                                        }
                                    }
                                },
                                required: ["questions"]
                            }
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const quizData = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // 🌟 最標準的 Word 文件 HTML 宣告
                let docHTML = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office"
                      xmlns:w="urn:schemas-microsoft-com:office:word"
                      xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
                <xml>
                  <w:WordDocument>
                    <w:View>Print</w:View>
                    <w:Zoom>100</w:Zoom>
                    <w:DoNotOptimizeForBrowser/>
                  </w:WordDocument>
                </xml>
                <style>
                    /* B4 尺寸與邊界設定 */
                    @page WordSection1 { size: 25.7cm 36.4cm; margin: 2cm; }
                    div.WordSection1 { page: WordSection1; }
                    body { font-family: '標楷體', 'Times New Roman', serif; font-size: 14pt; }
                </style>
                </head><body><div class="WordSection1">`;

                const groupedQs = { '選擇題': [], '填充題': [], '計算題': [] };
                if(quizData.questions) quizData.questions.forEach(q => { if(groupedQs[q.type]) groupedQs[q.type].push(q); });
                const getScore = (tName) => { const t = this.questionTypes.find(x => x.name === tName); return t ? parseInt(t.score) || 0 : 0; };

                // 1. 輸出試題 (自動分頁：每 6 題換頁)
                let flatQuestions = [];
                let sectionNum = ['一', '二', '三'];
                let sectionIdx = 0;

                ['選擇題', '填充題', '計算題'].forEach(tName => {
                    if (groupedQs[tName].length > 0) {
                        let score = getScore(tName);
                        let totalScore = score * groupedQs[tName].length;
                        flatQuestions.push({ isHeader: true, html: `<p style="font-size: 16pt; font-weight: bold; margin-top: 15px; margin-bottom: 10px;">${sectionNum[sectionIdx]}、${tName}（每題 ${score} 分，共 ${totalScore} 分）</p>` });
                        sectionIdx++;
                        
                        groupedQs[tName].forEach((q, idx) => {
                            let qHtml = `<p style="font-size: 14pt; margin: 8px 0; line-height: 1.5;">${idx + 1}. ${this.formatMathToWord(q.question)}</p>`;
                            if (q.options && q.options.length > 0) {
                                const formattedOptions = q.options.map(opt => this.formatMathToWord(opt)).join('　　');
                                qHtml += `<p style="font-size: 14pt; margin-left: 25px; margin-top:0; margin-bottom:8px;">${formattedOptions}</p>`;
                            }
                            if (tName === '計算題') qHtml += `<br><br><br><br><br><br>`;
                            else if (tName === '填充題') qHtml += `<br><br>`;
                            flatQuestions.push({ isHeader: false, html: qHtml });
                        });
                    }
                });

                if (this.exportOptions.examPaper) {
                    const Q_PER_PAGE = 6; 
                    let pages = [];
                    let currentPage = [];
                    let qCount = 0;

                    flatQuestions.forEach((item) => {
                        currentPage.push(item.html);
                        if (!item.isHeader) qCount++;
                        if (qCount >= Q_PER_PAGE) {
                            pages.push(currentPage);
                            currentPage = [];
                            qCount = 0;
                        }
                    });
                    if (currentPage.length > 0) pages.push(currentPage);

                    // 輸出頁面
                    pages.forEach((pageContent, index) => {
                        if (index > 0) {
                            // 🔥 Word 最原始的強制分頁代碼
                            docHTML += `<br clear="all" style="page-break-before:always; mso-break-type:page-break" />`;
                        }
                        docHTML += this.getHeaderHTML(false);
                        docHTML += pageContent.join('');
                    });

                    // 2. 輸出作答網格區 (強制換頁)
                    docHTML += `<br clear="all" style="page-break-before:always; mso-break-type:page-break" />`;
                    docHTML += this.getHeaderHTML(true);
                    docHTML += `<p style="text-align: center; font-size: 12pt; letter-spacing: 2px; margin: 10px 0;">---------------------------------------作答分隔線---------------------------------------</p>`;
                    
                    if (groupedQs['選擇題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold; margin: 10px 0;">單選題答題區（每題 ${getScore('選擇題')} 分）</p>`;
                        docHTML += `<table style="width: 100%; border-collapse: collapse; border: none; text-align: center; margin-bottom: 20px;">`;
                        let count = groupedQs['選擇題'].length;
                        for (let i = 0; i < count; i += 5) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 5; j++) { if (i + j < count) docHTML += `<td style="width: 20%; border: 1.5pt solid windowtext; font-size: 14pt; height: 45px;">${i + j + 1}.</td>`; else docHTML += `<td style="width: 20%; border: 1.5pt solid windowtext;"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 5; j++) docHTML += `<td style="border: 1.5pt solid windowtext; height: 45px;"></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }

                    if (groupedQs['填充題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold; margin: 10px 0;">填充題答題區（每格 ${getScore('填充題')} 分）</p>`;
                        docHTML += `<table style="width: 100%; border-collapse: collapse; border: none; text-align: center;">`;
                        let count = groupedQs['填充題'].length;
                        for (let i = 0; i < count; i += 4) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 4; j++) { if (i + j < count) docHTML += `<td style="width: 25%; border: 1.5pt solid windowtext; font-size: 14pt; height: 45px;">(${i + j + 1})</td>`; else docHTML += `<td style="width: 25%; border: 1.5pt solid windowtext;"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 4; j++) docHTML += `<td style="border: 1.5pt solid windowtext; height: 45px;"></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }
                }

                // 3. 輸出教師版解答與詳解
                if (this.exportOptions.correctAnswers) {
                    docHTML += `<br clear="all" style="page-break-before:always; mso-break-type:page-break" />`;
                    docHTML += `<h2 style="text-align: center; color: red;">教師版解答與解析</h2><hr>`;
                    
                    if (groupedQs['選擇題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold; margin-top: 10px; color: blue;">【選擇題 正確解答】</p>`;
                        docHTML += `<table style="width: 100%; border-collapse: collapse; border: none; text-align: center; margin-bottom: 20px;">`;
                        let count = groupedQs['選擇題'].length;
                        for (let i = 0; i < count; i += 5) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 5; j++) { if (i + j < count) docHTML += `<td style="width: 20%; border: 1.5pt solid blue; font-size: 14pt; height: 45px;">${i + j + 1}.</td>`; else docHTML += `<td style="width: 20%; border: 1.5pt solid blue;"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 5; j++) { if (i + j < count) docHTML += `<td style="border: 1.5pt solid blue; font-size: 14pt; height: 45px; color: red; font-weight: bold;">${this.formatMathToWord(groupedQs['選擇題'][i+j].answer || '')}</td>`; else docHTML += `<td style="border: 1.5pt solid blue;"></td>`; }
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }

                    if (groupedQs['填充題'].length > 0) {
                        docHTML += `<p style="font-size: 14pt; font-weight: bold; margin-top: 10px; color: blue;">【填充題 正確解答】</p>`;
                        docHTML += `<table style="width: 100%; border-collapse: collapse; border: none; text-align: center;">`;
                        let count = groupedQs['填充題'].length;
                        for (let i = 0; i < count; i += 4) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 4; j++) { if (i + j < count) docHTML += `<td style="width: 25%; border: 1.5pt solid blue; font-size: 14pt; height: 45px;">(${i + j + 1})</td>`; else docHTML += `<td style="width: 25%; border: 1.5pt solid blue;"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 4; j++) { if (i + j < count) docHTML += `<td style="border: 1.5pt solid blue; font-size: 14pt; height: 45px; color: red; font-weight: bold;">${this.formatMathToWord(groupedQs['填充題'][i+j].answer || '')}</td>`; else docHTML += `<td style="border: 1.5pt solid blue;"></td>`; }
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }

                    docHTML += `<br><hr><p style="font-size: 14pt; font-weight: bold; margin-top: 15px;">【各題詳解過程】</p>`;
                    ['選擇題', '填充題', '計算題'].forEach(tName => {
                        if (groupedQs[tName].length > 0) {
                            docHTML += `<h3 style="background-color:#f0f0f0; display:inline-block; padding:5px;">${tName}</h3>`;
                            groupedQs[tName].forEach((q, idx) => {
                                docHTML += `<p style="font-size: 14pt; line-height: 1.5; margin-bottom: 20px;"><b>第 ${idx + 1} 題：</b><br>`;
                                docHTML += `[詳解] ${this.formatMathToWord(q.solution || '無')}`;
                                docHTML += `</p>`;
                            });
                        }
                    });
                }

                docHTML += `</div></body></html>`;

                const fileName = `${this.exam.school}_${this.exam.name}_數學考卷(B4).doc`;
                this.downloadDocFile(docHTML, fileName);

                statusDiv.innerText = "✅ 考卷生成成功！已下載 .doc 檔。打開若有警告請選「是」，公式會自動轉換為原生方程式！";
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                }, 1500);

            } catch (error) {
                console.error(error);
                alert("生成失敗，錯誤細節：" + error.message);
                btn.innerHTML = originalHTML;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                statusDiv.innerText = "❌ 發生錯誤，請重試。";
            }
        }
    }
}).mount('#app');
</script>

</body>
</html>
