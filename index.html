<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學出題小幫手 - 完美段考排版版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0fdfa; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 12px; padding: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 24px; border: 1px solid #e2e8f0;}
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-checkbox { appearance: none; width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 4px; cursor: pointer; vertical-align: middle;}
        .custom-checkbox:checked { background-color: #0d9488; border-color: #0d9488; }
        .custom-checkbox:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .box-radio { appearance: none; width: 14px; height: 14px; border: 1.5px solid #000; cursor: pointer; vertical-align: middle; position: relative; top: -1px;}
        .box-radio:checked { background-color: #000; }
    </style>
</head>
<body class="text-gray-800 pb-10">

<div id="app" class="max-w-4xl mx-auto pt-10 px-4">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black text-teal-600 mb-2">數學出題小幫手</h1>
        <p class="text-gray-500 font-bold">預設 B4 尺寸 ‧ 雙表頭精準對齊 ‧ OMML原生公式直出</p>
    </div>

    <div class="glass-card flex items-center bg-white">
        <i class="fas fa-key text-amber-500 text-xl mr-3"></i>
        <div class="flex-grow">
            <input type="password" v-model="apiKey" @change="saveApiKey" placeholder="輸入 Google API 金鑰 (AIza...)" class="w-full border-b border-gray-300 focus:border-teal-500 outline-none py-1 text-sm">
        </div>
        <div v-if="apiKey" class="ml-3 text-green-600 text-sm font-bold"><i class="fas fa-check-circle"></i> 已設定</div>
        
        <div v-if="xsltReady" class="ml-4 text-xs font-bold text-teal-600 bg-teal-50 p-2 rounded-lg border border-teal-200">
            <i class="fas fa-magic"></i> Word 2010 公式引擎已啟動
        </div>
        <div v-else class="ml-4 text-xs font-bold text-amber-500 bg-amber-50 p-2 rounded-lg border border-amber-200">
            <i class="fas fa-spinner fa-spin"></i> 載入微軟公式引擎中...
        </div>
    </div>

    <div class="glass-card bg-white">
        <h2 class="text-lg font-bold mb-4 border-l-4 border-teal-500 pl-2 text-gray-800">1. 考卷表頭資訊</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label class="text-xs font-bold text-gray-500 mb-1 block">學校名稱</label><input v-model="exam.school" class="w-full border p-2 rounded outline-none focus:border-teal-500"></div>
            <div><label class="text-xs font-bold text-gray-500 mb-1 block">學年度</label><input v-model="exam.year" type="number" class="w-full border p-2 rounded outline-none focus:border-teal-500"></div>
            <div><label class="text-xs font-bold text-gray-500 mb-1 block">學期</label><input v-model="exam.semester" type="number" class="w-full border p-2 rounded outline-none focus:border-teal-500"></div>
            <div><label class="text-xs font-bold text-gray-500 mb-1 block">考試名稱</label><input v-model="exam.name" class="w-full border p-2 rounded outline-none focus:border-teal-500"></div>
        </div>
        <div class="flex flex-wrap gap-8 mt-5">
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-2">科別</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.dept" value="工科" class="box-radio mr-1">工科</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.dept" value="商科" class="box-radio mr-1">商科</label>
                <label class="cursor-pointer"><input type="radio" v-model="exam.dept" value="體育科" class="box-radio mr-1">體育科</label>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-2">年級</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.grade" value="高一" class="box-radio mr-1">高一</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.grade" value="高二" class="box-radio mr-1">高二</label>
                <label class="cursor-pointer"><input type="radio" v-model="exam.grade" value="高三" class="box-radio mr-1">高三</label>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 block mb-2">卡片與特殊生</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.useCard" :value="true" class="box-radio mr-1">使用答案卡</label>
                <label class="mr-3 cursor-pointer"><input type="radio" v-model="exam.useCard" :value="false" class="box-radio mr-1">不使用</label>
                <label class="cursor-pointer text-red-600 font-bold"><input type="checkbox" v-model="exam.specialNeeds" class="box-radio mr-1">特殊生考卷</label>
            </div>
        </div>
    </div>

    <div class="glass-card bg-white">
        <h2 class="text-lg font-bold mb-4 border-l-4 border-teal-500 pl-2 text-gray-800">2. 題型與範圍設定</h2>
        <div class="mb-4">
            <label class="text-xs font-bold text-gray-500 mb-1 block">出題範圍與特殊要求</label>
            <textarea v-model="examRules" rows="3" class="w-full border p-3 rounded outline-none focus:border-teal-500 bg-gray-50 text-sm" placeholder="輸入出題單元或特別要求..."></textarea>
        </div>
        <div class="space-y-3">
            <div v-for="(type, index) in questionTypes" :key="index" class="flex items-center gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100" :class="{'opacity-50': !type.enabled}">
                <div class="relative"><input type="checkbox" v-model="type.enabled" class="custom-checkbox relative z-10"></div>
                <span class="font-bold w-20">{{ type.name }}</span>
                <input type="number" v-model="type.count" class="w-20 border p-1 text-center rounded outline-none" :disabled="!type.enabled"> 題
                <span class="text-gray-300">|</span>
                <input type="number" v-model="type.score" class="w-20 border p-1 text-center rounded outline-none" :disabled="!type.enabled"> 分
            </div>
        </div>
    </div>

    <div class="text-center mt-8 bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
        <div class="flex justify-center gap-6 mb-6">
            <label class="cursor-pointer font-bold flex items-center"><input type="checkbox" v-model="exportOptions.examPaper" class="custom-checkbox mr-2"> 產生試題卷</label>
            <label class="cursor-pointer font-bold flex items-center text-red-600"><input type="checkbox" v-model="exportOptions.correctAnswers" class="custom-checkbox mr-2"> 產生教師解答卷</label>
        </div>
        <button @click="generateExam" :disabled="!xsltReady" class="bg-teal-600 text-white font-bold py-4 px-12 rounded-full shadow-lg hover:bg-teal-700 transition text-xl w-full md:w-auto disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fas fa-file-word mr-2"></i> 開始產生 Word 考卷 (.doc)
        </button>
        <p class="text-sm text-gray-500 mt-4 font-bold">⚠️ 下載後打開若出現「檔案格式警告」，請放心點擊「是(Y)」即可載入排版與公式。</p>
        <div id="status-message" class="mt-4 font-bold text-lg"></div>
    </div>
    
    <div class="mt-8 text-center">
        <span class="text-gray-400 font-black tracking-widest text-lg">V1.0 byKC</span>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            xsltReady: false,
            xsltProcessor: null,
            exam: { school: '三重商工', year: '114', semester: '2', name: '第一次期中考', dept: '工科', grade: '高二', useCard: false, specialNeeds: false },
            examRules: '範圍：高中數學。請務必使用單個 $ 包住所有的數字與數學公式。嚴禁使用純文字排版矩陣！',
            questionTypes: [
                { name: '單選題', enabled: true, count: 10, score: 6 },
                { name: '填充題', enabled: true, count: 8, score: 5 },
                { name: '計算題', enabled: false, count: 0, score: 10 }
            ],
            exportOptions: { examPaper: true, correctAnswers: true }
        }
    },
    async mounted() {
        // 載入微軟官方 MML2OMML 轉換檔，保證 Word 2010 能完美解析公式
        try {
            const response = await fetch("https://cdn.jsdelivr.net/gh/plurand/math-mso@master/MML2OMML.XSL");
            if(response.ok) {
                const text = await response.text();
                const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
                this.xsltProcessor = new XSLTProcessor();
                this.xsltProcessor.importStylesheet(xmlDoc);
                this.xsltReady = true;
            }
        } catch (e) {
            console.error("OMML 引擎載入失敗", e);
        }
    },
    methods: {
        saveApiKey() { localStorage.setItem('gemini_api_key', this.apiKey); },

        // 🌟 OMML 終極轉換器：LaTeX -> MathML -> Word 專屬的 OMML
        formatMath(text) {
            if (!text) return '';
            
            const toOMML = (tex) => {
                try {
                    let cleanTex = tex.replace(/\\\\/g, '\\');
                    const html = katex.renderToString(cleanTex, { output: 'mathml', throwOnError: false });
                    const match = html.match(/<math[^>]*>([\s\S]*?)<\/math>/i);
                    
                    if (match && this.xsltReady && this.xsltProcessor) {
                        let mathmlStr = `<math xmlns="http://www.w3.org/1998/Math/MathML">${match[1].replace(/<annotation[^>]*>[\s\S]*?<\/annotation>/gi, '').replace(/<\/?semantics[^>]*>/gi, '')}</math>`;
                        
                        const mathDoc = new DOMParser().parseFromString(mathmlStr, "text/xml");
                        const ommlDoc = this.xsltProcessor.transformToDocument(mathDoc);
                        let ommlStr = new XMLSerializer().serializeToString(ommlDoc);
                        
                        // 移除多餘宣告，避免破壞 HTML
                        return ommlStr.replace(/<\?xml[^>]*\?>/gi, '').replace(/xmlns:m="[^"]+"/gi, '');
                    }
                    return tex;
                } catch(e) { return tex; }
            };

            // 先隔離公式處理
            let mathBlocks = [];
            let placeholderText = text.replace(/\$\$([\s\S]+?)\$\$/g, (m, p1) => {
                mathBlocks.push(toOMML(p1.trim()));
                return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
            }).replace(/\$([\s\S]+?)\$/g, (m, p1) => {
                mathBlocks.push(toOMML(p1.trim()));
                return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
            });

            // 處理純文字換行，然後將公式補回
            let result = placeholderText.replace(/\n/g, '<br>');
            mathBlocks.forEach((block, idx) => {
                result = result.replace(`__MATH_BLOCK_${idx}__`, block);
            });

            return result;
        },

        // 🌟 表頭 1 (第一頁：無姓名版，完美仿造附件 Word)
        getHeaderPage1() {
            return `
            <table width="100%" border="1" cellspacing="0" cellpadding="6" style="border-collapse: collapse; border: 2px solid black; margin-bottom: 12px; font-family: '標楷體', 'Times New Roman', serif;">
                <tr>
                    <td colspan="2" align="center" style="border: 1px solid black; padding: 15px;">
                        <span style="font-size: 20pt; font-weight: bold; color: red;">${this.exam.school} ${this.exam.year}學年第${this.exam.semester}學期 ${this.exam.name}</span>
                    </td>
                    <td rowspan="2" width="20%" style="border: 1px solid black; padding: 8px; font-size: 12pt; line-height: 1.5;">
                        科目：<b>數學</b><br>
                        ${this.exam.useCard ? '■' : '□'}使用答案卡<br>
                        ${!this.exam.useCard ? '■' : '□'}不使用答案卡<br>
                        ${this.exam.specialNeeds ? '■' : '□'}特殊生考卷
                    </td>
                </tr>
                <tr>
                    <td width="40%" style="border: 1px solid black; padding: 8px; font-size: 12pt;">
                        科別：${this.exam.dept==='工科'?'■':'□'}工科　${this.exam.dept==='商科'?'■':'□'}商科　${this.exam.dept==='體育科'?'■':'□'}體育科
                    </td>
                    <td width="40%" style="border: 1px solid black; padding: 8px; font-size: 12pt;">
                        年級：${this.exam.grade==='高一'?'■':'□'}高一　${this.exam.grade==='高二'?'■':'□'}高二　${this.exam.grade==='高三'?'■':'□'}高三
                    </td>
                </tr>
            </table>
            <p style="text-align: right; font-size: 12pt; margin-top: 0; margin-bottom: 15px; font-family: '標楷體', 'Times New Roman', serif;">注意：請將答案填入背面作答區！！</p>
            `;
        },

        // 🌟 表頭 2 (第二頁：有姓名與總分框版，完美仿造附件 Word)
        getHeaderPage2() {
            return `
            <table width="100%" border="1" cellspacing="0" cellpadding="6" style="border-collapse: collapse; border: 2px solid black; margin-bottom: 12px; font-family: '標楷體', 'Times New Roman', serif;">
                <tr>
                    <td colspan="2" align="center" style="border: 1px solid black; padding: 15px;">
                        <span style="font-size: 20pt; font-weight: bold; color: red;">${this.exam.school} ${this.exam.year}學年第${this.exam.semester}學期 ${this.exam.name}</span>
                    </td>
                    <td rowspan="2" width="18%" style="border: 1px solid black; padding: 8px; font-size: 12pt; line-height: 1.5;">
                        科目：<b>數學</b><br>
                        ${this.exam.useCard ? '■' : '□'}使用答案卡<br>
                        ${!this.exam.useCard ? '■' : '□'}不使用答案卡<br>
                        ${this.exam.specialNeeds ? '■' : '□'}特殊生考卷
                    </td>
                    <td rowspan="3" width="14%" align="center" valign="top" style="border: 1px solid black; padding-top: 15px; font-size: 14pt; font-weight: bold;">
                        (總　分)
                    </td>
                </tr>
                <tr>
                    <td width="34%" style="border: 1px solid black; padding: 8px; font-size: 12pt;">
                        科別：${this.exam.dept==='工科'?'■':'□'}工科　${this.exam.dept==='商科'?'■':'□'}商科　${this.exam.dept==='體育科'?'■':'□'}體育科
                    </td>
                    <td width="34%" style="border: 1px solid black; padding: 8px; font-size: 12pt;">
                        年級：${this.exam.grade==='高一'?'■':'□'}高一　${this.exam.grade==='高二'?'■':'□'}高二　${this.exam.grade==='高三'?'■':'□'}高三
                    </td>
                </tr>
                <tr>
                    <td colspan="3" style="border: 1px solid black; padding: 12px 8px; font-size: 14pt;">
                        班級：＿＿＿＿＿＿　學號：＿＿＿＿＿＿　姓名：＿＿＿＿＿＿＿＿
                    </td>
                </tr>
            </table>
            `;
        },

        async generateExam(event) {
            if (!this.apiKey) { alert('請輸入 API Key！'); return; }
            
            const btn = event.currentTarget;
            const status = document.getElementById('status-message');
            const origHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI 正在努力出題排版中...';
            status.innerHTML = '';
            status.className = "mt-4 font-bold text-lg text-teal-600";

            try {
                const activeTypes = this.questionTypes.filter(t => t.enabled).map(t => `${t.name}: ${t.count}題`).join(', ');
                const prompt = `請出一份數學考卷。必須回傳純 JSON 格式。
【題型配置】：${activeTypes}
【要求】：${this.examRules}
⚠️ 【絕對要求】：所有數字與公式必須用單個 $ 包住，例如：$x^2+1=0$。禁止純文字拼湊數學式！`;

                // 🌟 Google 原生 Schema 保證 JSON 格式
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${this.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    questions: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                type: { type: "STRING" },
                                                question: { type: "STRING" },
                                                options: { type: "ARRAY", items: { type: "STRING" } },
                                                answer: { type: "STRING" },
                                                solution: { type: "STRING" }
                                            },
                                            required: ["type", "question", "answer", "solution"]
                                        }
                                    }
                                },
                                required: ["questions"]
                            }
                        }
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const quizData = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // 🌟 Word 宣告 (B4 尺寸，支援 OMML)
                let docHTML = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" 
                      xmlns:w="urn:schemas-microsoft-com:office:word" 
                      xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" 
                      xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                <meta charset="utf-8">
                <style>
                    /* 預設 B4 尺寸與邊界 */
                    @page WordSection1 { size: 25.7cm 36.4cm; margin: 1.5cm 2cm; }
                    div.WordSection1 { page: WordSection1; }
                    body { font-family: '標楷體', 'Times New Roman', serif; font-size: 14pt; }
                    p { margin: 0 0 10px 0; }
                </style>
                </head><body><div class="WordSection1">`;

                const getScore = (tName) => { const t = this.questionTypes.find(x => x.name === tName); return t ? parseInt(t.score) || 0 : 0; };
                const groupedQs = { '單選題': [], '填充題': [], '計算題': [] };
                
                if(quizData.questions) {
                    quizData.questions.forEach(q => {
                        let t = q.type;
                        if(t.includes('選擇')) t = '單選題';
                        if(groupedQs[t]) groupedQs[t].push(q);
                    });
                }

                // 整理所有題目成一個陣列，加上題號與配分
                let allQuestions = [];
                let sectionNum = ['一', '二', '三'];
                let sectionIdx = 0;

                ['單選題', '填充題', '計算題'].forEach(tName => {
                    if (groupedQs[tName].length > 0) {
                        let score = getScore(tName);
                        let total = score * groupedQs[tName].length;
                        
                        // 選擇題要加上「(每題 X 分)」；填充題「(每格 X 分)」
                        let unit = tName === '填充題' ? '格' : '題';
                        allQuestions.push({ isHeader: true, html: `<p style="font-size: 16pt; font-weight: bold; margin-top: 15px;">${sectionNum[sectionIdx]}、${tName}（每${unit} ${score} 分，共 ${total} 分）</p>` });
                        sectionIdx++;
                        
                        groupedQs[tName].forEach((q, idx) => {
                            // 填充題題號用 (1)，其他用 1.
                            let numStr = tName === '填充題' ? `(${idx + 1})` : `${idx + 1}.`;
                            let qHtml = `<p style="margin: 8px 0; line-height: 1.5;">${numStr} ${this.formatMath(q.question)}</p>`;
                            if (q.options && q.options.length > 0) {
                                qHtml += `<p style="margin-left: 30px; margin-bottom: 12px;">${q.options.map(opt => this.formatMath(opt)).join('　　')}</p>`;
                            }
                            if (tName === '計算題') qHtml += `<br><br><br><br>`;
                            else if (tName === '填充題') qHtml += `<br><br>`;
                            allQuestions.push({ isHeader: false, html: qHtml });
                        });
                    }
                });

                if (this.exportOptions.examPaper) {
                    // ==========================================
                    // 【精準分頁邏輯】：對半切，第一半放第一頁，第二半放第二頁
                    // ==========================================
                    let totalQs = allQuestions.filter(q => !q.isHeader).length;
                    let midPoint = Math.ceil(totalQs / 2);
                    let part1HTML = "";
                    let part2HTML = "";
                    let qCount = 0;

                    allQuestions.forEach(q => {
                        if (!q.isHeader) qCount++;
                        if (qCount <= midPoint || (q.isHeader && qCount < midPoint)) {
                            part1HTML += q.html;
                        } else {
                            part2HTML += q.html;
                        }
                    });

                    // --- 【第一頁：表頭 1 + 前半段題目】 ---
                    docHTML += this.getHeaderPage1();
                    docHTML += part1HTML;

                    // 🌟 【Ctrl + Enter 強制換頁】
                    docHTML += `<br clear="all" style="page-break-before:always" />`;

                    // --- 【第二頁：表頭 2 + 後半段題目 + 作答區】 ---
                    docHTML += this.getHeaderPage2();
                    docHTML += part2HTML;
                    
                    // 答案格緊接在第二頁最下方
                    docHTML += `<br><p style="text-align: center; letter-spacing: 2px; font-size: 12pt; margin-top: 10px;">---------------------------------------作答區---------------------------------------</p>`;

                    if (groupedQs['單選題'].length > 0) {
                        docHTML += `<p style="font-weight: bold; font-size: 14pt; margin: 10px 0;">單選題答題區（每題 ${getScore('單選題')} 分）</p>`;
                        docHTML += `<table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; text-align: center; margin-bottom: 20px;">`;
                        let count = groupedQs['單選題'].length;
                        for (let i = 0; i < count; i += 5) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 5; j++) { if (i + j < count) docHTML += `<td width="20%" style="font-size:14pt;">${i + j + 1}.</td>`; else docHTML += `<td width="20%"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 5; j++) docHTML += `<td style="height:50px;"></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }

                    if (groupedQs['填充題'].length > 0) {
                        docHTML += `<p style="font-weight: bold; font-size: 14pt; margin: 10px 0;">填充題答題區（每格 ${getScore('填充題')} 分）</p>`;
                        docHTML += `<table width="100%" border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse; border: 2px solid black; text-align: center;">`;
                        let count = groupedQs['填充題'].length;
                        for (let i = 0; i < count; i += 4) {
                            docHTML += `<tr>`;
                            for (let j = 0; j < 4; j++) { if (i + j < count) docHTML += `<td width="25%" style="font-size:14pt;">(${i + j + 1})</td>`; else docHTML += `<td width="25%"></td>`; }
                            docHTML += `</tr><tr>`;
                            for (let j = 0; j < 4; j++) docHTML += `<td style="height:50px;"></td>`;
                            docHTML += `</tr>`;
                        }
                        docHTML += `</table>`;
                    }
                }

                // ==========================================
                // 【第三頁：解答區】
                // ==========================================
                if (this.exportOptions.correctAnswers) {
                    docHTML += `<br clear="all" style="page-break-before:always" />`;
                    docHTML += `<h2 style="text-align: center; color: red; margin-bottom: 10px;">教師版解答與解析</h2><hr style="margin-bottom: 15px;">`;
                    ['單選題', '填充題', '計算題'].forEach(tName => {
                        if (groupedQs[tName].length > 0) {
                            docHTML += `<h3 style="background-color: #f3f4f6; padding: 5px 10px; display: inline-block;">${tName}</h3>`;
                            groupedQs[tName].forEach((q, idx) => {
                                let numStr = tName === '填充題' ? `(${idx + 1})` : `${idx + 1}.`;
                                docHTML += `<p style="line-height: 1.5; margin-bottom: 15px;"><b>第 ${numStr} 題：</b> 解答：<span style="color:red; font-weight:bold;">${this.formatMath(q.answer)}</span><br>詳解：${this.formatMath(q.solution)}</p>`;
                            });
                        }
                    });
                }

                docHTML += `</div></body></html>`;

                // 產生並下載檔案 (維持 .doc)
                const blob = new Blob(['\ufeff', docHTML], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${this.exam.school}_${this.exam.name}_數學考卷(B4).doc`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                btn.innerHTML = origHTML;
                status.className = "mt-4 font-bold text-lg text-green-600";
                status.innerHTML = `✅ 考卷生成成功！已下載檔案。<br><span style="font-size:14px; color:#4a5568;">💡 若打開出現格式警告請選「是」。公式已原生轉換。</span>`;

            } catch (error) {
                console.error(error);
                btn.innerHTML = origHTML;
                status.className = "mt-4 font-bold text-lg text-red-600";
                status.innerText = `❌ 發生錯誤：${error.message}`;
            }
        }
    }
}).mount('#app');
</script>

</body>
</html>
