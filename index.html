<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            exam: { school: '三重商工', year: '114', semester: '2', name: '第一次期中考' }
        }
    },
    methods: {

        // ⭐ MathML → OMML（Word可編輯核心）
        mathMLToOMML(mathml) {
            try {
                const parser = new DOMParser();
                const xml = parser.parseFromString(mathml, "text/xml");

                const serializer = new XMLSerializer();
                const content = xml.documentElement.textContent;

                // ⭐ 轉成 Word 可讀的 OMML
                return `
                <m:oMath>
                    <m:r>
                        <m:t>${content}</m:t>
                    </m:r>
                </m:oMath>
                `;
            } catch (e) {
                return mathml;
            }
        },

        // ⭐ LaTeX → OMML
        formatMathToWord(text) {
            if (!text) return '';

            let result = text.replace(/\n/g, '<br>');

            const convert = (tex) => {
                try {
                    const html = katex.renderToString(tex, {
                        throwOnError: false,
                        output: 'mathml'
                    });

                    let match = html.match(/<math[^>]*>[\s\S]*?<\/math>/i);

                    if (match) {
                        let mathml = match[0];

                        mathml = mathml.replace(/<annotation[^>]*>[\s\S]*?<\/annotation>/gi, '');
                        mathml = mathml.replace(/<\/?semantics[^>]*>/gi, '');

                        return this.mathMLToOMML(mathml);
                    }

                    return tex;
                } catch {
                    return tex;
                }
            };

            result = result.replace(/\$\$([\s\S]+?)\$\$/g, (_, p1) => convert(p1.trim()));
            result = result.replace(/\$([^$]+)\$/g, (_, p1) => convert(p1.trim()));

            return result;
        },

        // ⭐ 下載 Word
        downloadDoc(html) {
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'math_exam.doc';
            a.click();

            URL.revokeObjectURL(url);
        },

        // ⭐ 測試生成
        generate() {

            const sample = `
            1. 解方程式：$x^2 + 5x + 6 = 0$

            2. 計算：$\\frac{1}{2}x^2 + 3x$

            3. 根號：$\\sqrt{16 + x}$
            `;

            const content = this.formatMathToWord(sample);

            const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office'
                  xmlns:w='urn:schemas-microsoft-com:office:word'
                  xmlns:m='http://schemas.microsoft.com/office/2004/12/omml'>
            <head>
                <meta charset='utf-8'>
            </head>
            <body style="font-family:標楷體; font-size:14pt;">
                ${content}
            </body>
            </html>
            `;

            this.downloadDoc(html);
        }
    }
}).mount('#app');
</script>
